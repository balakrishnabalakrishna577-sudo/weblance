{% extends 'adminpanel/base.html' %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="ap-card" style="max-width:600px;">
    <div class="ap-card-header">
        <h5><i class="fas fa-user-edit"></i> Edit — {{ u.username }}</h5>
        <a href="{% url 'admin_users' %}" class="ap-btn ap-btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <div class="ap-card-body">
        <form method="post">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div>
                    <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Username</label>
                    <input type="text" name="username" value="{{ u.username }}" required
                        style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                        onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div>
                    <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Email</label>
                    <input type="email" name="email" value="{{ u.email }}"
                        style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                        onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div>
                    <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">First Name</label>
                    <input type="text" name="first_name" value="{{ u.first_name }}"
                        style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                        onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div>
                    <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Last Name</label>
                    <input type="text" name="last_name" value="{{ u.last_name }}"
                        style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                        onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
                </div>
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">
                    New Password <span style="color:#555;font-size:0.72rem;text-transform:none;letter-spacing:0">(leave blank to keep current)</span>
                </label>
                <input type="password" name="password" placeholder="Enter new password…"
                    style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                    onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
            </div>
            <div style="display:flex;gap:24px;margin-bottom:24px;padding:14px 16px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid var(--border);">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#e8e8e8;font-size:0.88rem;">
                    <input type="checkbox" name="is_active" {% if u.is_active %}checked{% endif %} style="accent-color:var(--green);width:16px;height:16px;">
                    Active Account
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#e8e8e8;font-size:0.88rem;">
                    <input type="checkbox" name="is_staff" {% if u.is_staff %}checked{% endif %} style="accent-color:var(--green);width:16px;height:16px;">
                    Admin / Staff
                </label>
            </div>
            <div style="display:flex;gap:10px;">
                <button type="submit" class="ap-btn ap-btn-green"><i class="fas fa-save"></i> Save Changes</button>
                <a href="{% url 'admin_users' %}" class="ap-btn ap-btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
