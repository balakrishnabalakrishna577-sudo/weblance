{% extends 'adminpanel/base.html' %}
{% block title %}Add Portfolio Item{% endblock %}
{% block page_title %}Add Portfolio Item{% endblock %}

{% block content %}
<div class="ap-card" style="max-width:680px">
    <div class="ap-card-header">
        <h5><i class="fas fa-plus"></i> New Portfolio Item</h5>
        <a href="{% url 'admin_portfolio' %}" class="ap-btn ap-btn-outline"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <div class="ap-card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div style="margin-bottom:18px">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Title *</label>
                <input type="text" name="title" required placeholder="e.g. Corporate Business Website"
                    style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                    onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <div style="margin-bottom:18px">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Category</label>
                <select name="category" style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none">
                    <option value="business">Business Websites</option>
                    <option value="ecommerce">E-Commerce Websites</option>
                    <option value="landing">Landing Pages</option>
                </select>
            </div>

            <div style="margin-bottom:18px">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Description *</label>
                <textarea name="description" rows="4" required placeholder="Brief description of the project..."
                    style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none;resize:vertical"
                    onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'"></textarea>
            </div>

            <div style="margin-bottom:18px">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Live URL</label>
                <input type="url" name="live_url" placeholder="https://..."
                    style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:0.9rem;outline:none"
                    onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <div style="margin-bottom:24px">
                <label style="display:block;font-size:0.8rem;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Image *</label>
                <input type="file" name="image" accept="image/*" required
                    style="width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--gray);font-size:0.85rem">
                <div style="font-size:0.75rem;color:var(--gray);margin-top:6px">Recommended: 800×500px, JPG or PNG</div>
            </div>

            <div style="display:flex;gap:10px">
                <button type="submit" class="ap-btn ap-btn-green"><i class="fas fa-plus"></i> Add Item</button>
                <a href="{% url 'admin_portfolio' %}" class="ap-btn ap-btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
